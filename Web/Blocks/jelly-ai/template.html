<div class="chat-container">
  <div class="chat-header">
    <span class="chat-header-avatar" id="header-avatar">🤖</span>
    <div class="chat-header-info">
      <h3 id="chat-title">JellyAI Assistant</h3>
      <span class="chat-status">Ready to suggest media</span>
    </div>
  </div>
  <div class="chat-messages" id="chat-messages">
    <div class="message system-msg">
      <span class="avatar">🤖</span>
      <div class="msg-bubble">
        Hello! I am your Jellyfin Media Assistant. Ask me to recommend movies, shows, or music from your library! For example, try: <i>"Show me highly rated movies"</i> or <i>"Recommend something sci-fi"</i>.
      </div>
    </div>
  </div>
  <div class="chat-input-area">
    <input type="text" id="chat-input" placeholder="Ask JellyAI for recommendations..." />
    <button id="send-btn">
      <span class="material-symbols-outlined">send</span>
    </button>
  </div>
</div>
