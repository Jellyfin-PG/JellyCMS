<div class="request-container">
  <div class="request-header">
    <span class="material-symbols-outlined request-icon">add_to_queue</span>
    <h2 id="request-title">Request Movies & TV Shows</h2>
  </div>
  <div class="search-box">
    <span class="material-symbols-outlined search-icon">search</span>
    <input type="text" id="search-input" placeholder="Search for movies or TV shows to request..." />
  </div>
  <div class="results-grid" id="results-root">
    <div class="search-tip">Type a movie or show name above to start requesting!</div>
  </div>
</div>
