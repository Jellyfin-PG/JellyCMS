<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" class="shadow-xl rounded-xl">
    <defs>
        <radialGradient id="radialGlow" cx="50%" cy="50%" r="70%">
            <stop offset="0%" stop-color="#191919" />
            <stop offset="100%" stop-color="#0D0D0D" />
        </radialGradient>
        
        <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.45" />
        </filter>
        <filter id="glow-effect" x="-10%" y="-10%" width="120%" height="120%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <rect x="26" y="26" width="460" height="460" rx="0" fill="url(#radialGlow)" />
    
    <line x1="141" y1="32" x2="141" y2="480" stroke="#262626" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.65" />
    <line x1="32" y1="141" x2="480" y2="141" stroke="#262626" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.65" />
    <line x1="256" y1="32" x2="256" y2="480" stroke="#262626" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.65" />
    <line x1="32" y1="256" x2="480" y2="256" stroke="#262626" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.65" />
    <line x1="371" y1="32" x2="371" y2="480" stroke="#262626" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.65" />
    <line x1="32" y1="371" x2="480" y2="371" stroke="#262626" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.65" />
    
    <line x1="256" y1="32" x2="256" y2="256" stroke="#262626" stroke-width="10" stroke-linecap="round" opacity="0.8" />
    <line x1="32" y1="256" x2="480" y2="256" stroke="#262626" stroke-width="10" stroke-linecap="round" opacity="0.8" />
    
    <g fill="#262626" opacity="0.6">
        <circle cx="301" cy="71" r="3.5" /><circle cx="371" cy="71" r="3.5" /><circle cx="441" cy="71" r="3.5" />
        <circle cx="301" cy="141" r="3.5" /><circle cx="371" cy="141" r="3.5" /><circle cx="441" cy="141" r="3.5" />
        <circle cx="301" cy="211" r="3.5" /><circle cx="371" cy="211" r="3.5" /><circle cx="441" cy="211" r="3.5" />
    </g>
    
    <g transform="translate(76, 306)">
        <rect width="360" height="130" rx="16" fill="none" stroke="#262626" stroke-width="3" stroke-dasharray="10 6" />
        
        <g stroke="#262626" stroke-linecap="round" fill="none" opacity="0.8">
            <path d="M 30 80 L 100 40 L 170 70 L 240 30 L 310 90" stroke-width="4" />
            <circle cx="30" cy="80" r="4.5" fill="#262626" stroke="#0D0D0D" stroke-width="2" />
            <circle cx="100" cy="40" r="4.5" fill="#262626" stroke="#0D0D0D" stroke-width="2" />
            <circle cx="170" cy="70" r="4.5" fill="#262626" stroke="#0D0D0D" stroke-width="2" />
            <circle cx="240" cy="30" r="4.5" fill="#262626" stroke="#0D0D0D" stroke-width="2" />
            <circle cx="310" cy="90" r="4.5" fill="#262626" stroke="#0D0D0D" stroke-width="2" />
        </g>
        
        <rect x="30" y="11" width="100" height="14" rx="4" fill="#262626" opacity="0.3" />
        <rect x="140" y="11" width="60" height="14" rx="4" fill="#262626" opacity="0.15" />
    </g>

    <rect x="26" y="26" width="460" height="460" rx="0" fill="none" stroke="#FFFFFF" stroke-width="12" pointer-events="none" />

    <g transform="translate(75, 75)" style="cursor: move;" id="svg-draggable-block" class="group">
        <rect width="132" height="132" rx="16" fill="#FFFFFF" filter="url(#soft-shadow)" />
        
        <line x1="24" y1="36" x2="108" y2="36" stroke="#0D0D0D" stroke-width="6.5" stroke-linecap="round" />
        <line x1="24" y1="58" x2="120" y2="58" stroke="#0D0D0D" stroke-width="4.5" stroke-linecap="round" opacity="0.45" />
        
        <rect x="24" y="80" width="38" height="20" rx="10" fill="#0D0D0D" />
        <circle cx="43" cy="90" r="7" fill="#FFFFFF" />

        
        <rect x="-5" y="-5" width="10" height="10" fill="#FFFFFF" stroke="#0D0D0D" stroke-width="2" rx="1.5" class="handle" />
        <rect x="127" y="-5" width="10" height="10" fill="#FFFFFF" stroke="#0D0D0D" stroke-width="2" rx="1.5" class="handle" />
        <rect x="-5" y="127" width="10" height="10" fill="#FFFFFF" stroke="#0D0D0D" stroke-width="2" rx="1.5" class="handle" />
        <rect x="127" y="127" width="10" height="10" fill="#FFFFFF" stroke="#0D0D0D" stroke-width="2" rx="1.5" class="handle" />
    </g>

    <g transform="translate(236, 212)" style="cursor: grab;" id="svg-draggable-cursor" class="group">
        <circle cx="0" cy="0" r="14" fill="#FFFFFF" opacity="0.1" filter="url(#glow-effect)" />
        <path d="M 0 0 L 0 54 L 16 38 L 40 38 Z" fill="#FFFFFF" stroke="#0D0D0D" stroke-width="3" stroke-linejoin="round" filter="url(#soft-shadow)" />
    </g>
</svg>